name: Build & Deploy to PinMe

on:
  push:
    branches: [main]
    # 纯文档/配置改动不触发部署（一次 push 全部命中这些路径时跳过）。
    # 想强制部署可在 Actions 页用 workflow_dispatch 手动触发。
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch:

# 同一时间只跑一个部署，新 push 会取消正在进行的旧任务
concurrency:
  group: pinme-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Install PinMe CLI
        run: npm install -g pinme

      - name: Configure PinMe appkey
        run: pinme set-appkey "$PINME_APPKEY"
        env:
          PINME_APPKEY: ${{ secrets.PINME_APPKEY }}

      - name: Deploy to PinMe
        run: pinme upload dist --domain knowcs
